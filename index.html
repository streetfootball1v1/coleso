<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Paper Jar</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfaf6;
            --glass: rgba(255, 255, 255, 0.4);
            --gold: #d4a373;
            --text: #4a4a4a;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Montserrat', sans-serif; margin: 0; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
        }

        h2 { font-family: 'Playfair Display', serif; font-size: 30px; font-style: italic; font-weight: 400; margin-bottom: 25px; }

        #jar-wrapper {
            position: relative; width: 320px; height: 430px;
            background: var(--glass); border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 120px 120px 40px 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03), inset 0 0 30px rgba(255,255,255,0.4);
            backdrop-filter: blur(5px); overflow: hidden;
            transform-style: preserve-3d;
        }

        /* Золотая каемка сверху */
        #jar-wrapper::before {
            content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 90px; height: 5px; background: var(--gold); border-radius: 0 0 10px 10px; opacity: 0.5;
        }

        .paper-note {
            position: absolute; width: 40px; height: 40px; /* Размер картинки */
            /* ПНГ-изображение скрученной бумажки (Base64) */
            background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACgAAAAoCAYAAACM/rhtAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAAEnQAABJ0Ad5mH3gAAAAtSURBVFhH7cExAQAAAMKg9U9tCY+eAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA4G99jAABh22LdAAAAABJRU5ErkJggg==");
            background-size: contain; background-repeat: no-repeat; background-position: center;
            opacity: 0.9; transform-style: preserve-3d;
            will-change: transform;
        }

        /* Спецэффект: разные оттенки бумаги */
        .paper-note:nth-child(2n) { filter: hue-rotate(10deg); }
        .paper-note:nth-child(3n) { filter: brightness(0.9) hue-rotate(-10deg); }

        #draw-btn {
            margin-top: 40px; padding: 18px 55px;
            font-size: 13px; font-weight: 500; letter-spacing: 2px;
            text-transform: uppercase; border: none;
            background: white; color: var(--gold);
            border-radius: 40px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03); transition: 0.3s;
        }
        #draw-btn:hover { background: #bc8a5f; color: white; transform: translateY(-1px); }
        #draw-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Окно победителя */
        #result-screen {
            display: none; position: fixed; inset: 0; background: rgba(253, 250, 246, 0.98);
            z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
            animation: fadeIn 0.8s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .ticket-box {
            background: white; padding: 35px 50px; text-align: center;
            border-radius: 2px; border: 1px solid #f2f2f2;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            transform: scale(0); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #result-screen.active .ticket-box { transform: scale(1); }
        .w-name { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--gold); margin: 0; font-weight: 400; }
    </style>
</head>
<body>

    <h2>Gold Collection</h2>

    <div id="jar-wrapper">
        <div id="notes-container"></div>
    </div>

    <button id="draw-btn" onclick="startSelection()">Pick the Winner</button>

    <div id="result-screen" onclick="closeScreen()">
        <p style="letter-spacing: 3px; font-size: 11px; margin-bottom: 25px; opacity: 0.5;">CONGRATULATIONS</p>
        <div class="ticket-box">
            <h1 id="winner-name" class="w-name">...</h1>
        </div>
        <p style="margin-top: 60px; font-size: 10px; opacity: 0.3;">TOUCH TO EXIT</p>
    </div>

    <script>
        const container = document.getElementById('notes-container');
        const params = new URLSearchParams(window.location.search);
        const realNames = (params.get('names') || "Anna,Mark,Helen,John,Sarah").split(',');
        
        const papers = [];
        const TOTAL_NOTES = 70; // 70 летящих билетиков

        function init() {
            for (let i = 0; i < TOTAL_NOTES; i++) {
                const div = document.createElement('div');
                div.className = 'paper-note';
                
                const p = {
                    el: div,
                    x: Math.random() * 260 + 20,
                    y: Math.random() * 300 + 80,
                    r: Math.random() * 360,
                    ry: Math.random() * 360, // 3D вращение
                    vx: 0, vy: 0
                };
                
                container.appendChild(div);
                papers.push(p);
            }
            update();
        }

        function update() {
            papers.forEach(p => {
                p.el.style.transform = `translate3d(${p.x}px, ${p.y}px, 0) rotateZ(${p.r}deg) rotateY(${p.ry}deg)`;
            });
        }

        function startSelection() {
            const btn = document.getElementById('draw-btn');
            btn.disabled = true; btn.style.opacity = '0.4';

            let start = performance.now();
            const duration = 4000;

            function animate(now) {
                const elapsed = now - start;
                const progress = elapsed / duration;

                if (progress < 1) {
                    papers.forEach(p => {
                        const power = Math.sin(progress * Math.PI) * 15;
                        p.vx += (Math.random() - 0.5) * power;
                        p.vy += (Math.random() - 0.5) * power;
                        
                        p.vx *= 0.95; p.vy *= 0.95;
                        p.x += p.vx; p.y += p.vy;
                        p.r += p.vx * 2;
                        p.ry += p.vx * 3;

                        // Стенки
                        if (p.x < 15 || p.x > 265) p.vx *= -1.2;
                        if (p.y < 40 || p.y > 385) p.vy *= -1.2;
                    });
                    update();
                    requestAnimationFrame(animate);
                } else {
                    const winner = realNames[Math.floor(Math.random() * realNames.length)];
                    document.getElementById('winner-name').innerText = winner;
                    const screen = document.getElementById('result-screen');
                    screen.style.display = 'flex';
                    setTimeout(() => screen.classList.add('active'), 100);
                    
                    confetti({
                        particleCount: 50, spread: 60, colors: ['#d4a373', '#ffffff', '#faedcd'], origin: { y: 0.7 }, scalar: 0.7, gravity: 0.6
                    });
                }
            }
            requestAnimationFrame(animate);
        }

        function closeScreen() {
            location.reload(); // Сброс для нового шанса
        }

        init();
    </script>
</body>
</html>
