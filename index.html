<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Lotto Jar</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #00f2ff;
            --accent: #ffd700;
        }
        body { 
            background: #050505; color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        
        /* Стеклянная колба */
        #jar-wrapper {
            position: relative; width: 340px; height: 450px;
            background: rgba(255, 255, 255, 0.03);
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 150px 150px 40px 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 40px rgba(0, 242, 255, 0.05);
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        /* Блик на стекле */
        #jar-wrapper::after {
            content: ''; position: absolute; top: 10%; left: 15%; width: 30px; height: 150px;
            background: rgba(255,255,255,0.1); border-radius: 50%; filter: blur(10px);
        }

        .paper {
            position: absolute; width: 45px; height: 22px;
            border-radius: 3px; opacity: 0.9;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.4);
            transition: transform 0.1s linear;
        }

        /* Подсветка дна */
        #jar-bottom {
            position: absolute; bottom: 0; width: 100%; height: 15px;
            background: var(--primary); filter: blur(15px); opacity: 0.3;
        }

        button {
            margin-top: 40px; padding: 18px 60px; font-size: 20px; font-weight: bold;
            cursor: pointer; background: transparent; color: var(--primary);
            border: 2px solid var(--primary); border-radius: 50px; 
            transition: 0.3s; text-transform: uppercase; letter-spacing: 2px;
        }
        button:hover { background: var(--primary); color: #000; box-shadow: 0 0 30px var(--primary); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Окно победителя */
        #overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        
        #winner-ticket {
            width: 300px; padding: 40px 20px; background: white; color: #111;
            text-align: center; font-size: 36px; font-weight: 900;
            border-radius: 10px; border-bottom: 8px dashed #ccc;
            transform: scale(0); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #overlay.active #winner-ticket { transform: scale(1) rotate(-3deg); }
    </style>
</head>
<body>

    <h2 style="letter-spacing: 4px; color: rgba(255,255,255,0.5)">AIR LOTTO</h2>

    <div id="jar-wrapper">
        <div id="jar-bottom"></div>
        </div>

    <button id="drawBtn" onclick="startDraw()">КРУТИТЬ БАРАБАН</button>

    <div id="overlay" onclick="closeOverlay()">
        <p style="color: var(--primary); margin-bottom: 20px;">СЧАСТЛИВЫЙ БИЛЕТ:</p>
        <div id="winner-ticket">ИМЯ</div>
        <p style="margin-top: 40px; font-size: 12px; color: #555;">Кликни, чтобы продолжить</p>
    </div>

    <script>
        const container = document.getElementById('jar-wrapper');
        const params = new URLSearchParams(window.location.search);
        
        // Реальные имена из базы
        const realNames = (params.get('names') || "Мария,Алексей,Елена").split(',');
        
        // Настройки количества бумажек
        const TOTAL_PAPERS = 100; // Всего бумажек в банке
        let papers = [];

        function initJar() {
            for (let i = 0; i < TOTAL_PAPERS; i++) {
                const el = document.createElement('div');
                el.className = 'paper';
                
                // Если i меньше количества реальных имен, это "именная" бумажка, иначе "пустышка"
                const isReal = i < realNames.length;
                el.dataset.name = isReal ? realNames[i] : "пустышка";
                
                // Цвета: именные — золотистые/голубые, пустышки — белые/серые
                el.style.background = isReal ? 'linear-gradient(45deg, #00f2ff, #0066ff)' : 'linear-gradient(45deg, #eee, #bbb)';
                
                const p = {
                    el,
                    x: Math.random() * 280 + 20,
                    y: Math.random() * 300 + 100,
                    r: Math.random() * 360,
                    vx: 0, vy: 0, vr: 0
                };
                
                container.appendChild(el);
                papers.push(p);
            }
            updatePhysics();
        }

        function updatePhysics() {
            papers.forEach(p => {
                p.el.style.transform = `translate(${p.x}px, ${p.y}px) rotate(${p.r}deg)`;
            });
        }

        function startDraw() {
            const btn = document.getElementById('drawBtn');
            btn.disabled = true;
            
            let start = performance.now();
            const duration = 4000;

            function mix(now) {
                const elapsed = now - start;
                const progress = elapsed / duration;

                if (progress < 1) {
                    papers.forEach((p, i) => {
                        // Вихревое движение
                        const centerX = 150;
                        const centerY = 200;
                        const angle = Math.atan2(p.y - centerY, p.x - centerX);
                        const dist = Math.sqrt((p.y - centerY)**2 + (p.x - centerX)**2);
                        
                        // Сила "ветра" зависит от времени (сначала разгон, потом затухание)
                        const power = Math.sin(progress * Math.PI) * 25;
                        
                        p.vx += Math.cos(angle + 1.5) * power * Math.random();
                        p.vy += Math.sin(angle + 1.5) * power * Math.random();
                        
                        // Трение
                        p.vx *= 0.92;
                        p.vy *= 0.92;
                        
                        p.x += p.vx;
                        p.y += p.vy;
                        p.r += (p.vx + p.vy) * 2;

                        // Отскоки от стенок колбы
                        if (p.x < 10 || p.x > 280) p.vx *= -1;
                        if (p.y < 50 || p.y > 400) p.vy *= -1;
                    });
                    
                    updatePhysics();
                    requestAnimationFrame(mix);
                } else {
                    showWinner();
                }
            }
            requestAnimationFrame(mix);
        }

        function showWinner() {
            // Выбираем случайное имя из РЕАЛЬНОГО списка
            const winner = realNames[Math.floor(Math.random() * realNames.length)];
            const overlay = document.getElementById('overlay');
            const ticket = document.getElementById('winner-ticket');
            
            ticket.innerText = winner;
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 50);

            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#00f2ff', '#ffd700', '#ffffff']
            });
        }

        function closeOverlay() {
            const overlay = document.getElementById('overlay');
            overlay.classList.remove('active');
            setTimeout(() => {
                overlay.style.display = 'none';
                document.getElementById('drawBtn').disabled = false;
            }, 500);
        }

        initJar();
    </script>
</body>
</html>
