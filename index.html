<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Raffle</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            background: #0f0c29; 
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; margin: 0;
        }
        h2 { text-transform: uppercase; letter-spacing: 5px; color: #f1c40f; margin-bottom: 20px; }
        
        #wrapper { position: relative; width: 360px; height: 360px; }
        canvas { width: 100%; height: 100%; border-radius: 50%; border: 10px solid #1a1a2e; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        
        #arrow { 
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%); 
            width: 40px; height: 40px; background: #f1c40f; 
            clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10;
        }

        button { 
            margin-top: 50px; padding: 15px 60px; font-size: 22px; font-weight: bold;
            cursor: pointer; background: #f1c40f; color: #0f0c29;
            border: none; border-radius: 50px; transition: 0.2s;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.4);
        }
        button:hover { transform: scale(1.05); background: #fff; }
        button:disabled { background: #555; cursor: not-allowed; }

        #overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        #result-box { text-align: center; animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes zoomIn { from { transform: scale(0); } to { transform: scale(1); } }
    </style>
</head>
<body>

    <h2>LUXE DRAW</h2>

    <div id="wrapper">
        <div id="arrow"></div>
        <canvas id="wheel" width="600" height="600"></canvas>
    </div>

    <button id="spinBtn" onclick="spin()">START</button>

    <div id="overlay">
        <div id="result-box">
            <h3 style="color: #aaa;">WINNER</h3>
            <h1 id="winner-name" style="font-size: 60px; color: #f1c40f; margin: 10px 0;">...</h1>
            <button onclick="closeOverlay()">OK</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        const params = new URLSearchParams(window.location.search);
        const names = (params.get('names') || "Мария,Иван,Анна,Олег,Елена,Дмитрий,Светлана,Игорь").split(',');
        
        const colors = ['#1a1a2e', '#f1c40f', '#16213e', '#e67e22', '#0f3460', '#f39c12'];
        let currentRotation = 0;
        let isSpinning = false;

        function playTick() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function draw() {
            const slice = (Math.PI * 2) / names.length;
            ctx.clearRect(0, 0, 600, 600);
            names.forEach((_, i) => {
                const angle = currentRotation + i * slice;
                ctx.beginPath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.moveTo(300, 300);
                ctx.arc(300, 300, 290, angle, angle + slice);
                ctx.fill();
                ctx.stroke();

                ctx.save();
                ctx.translate(300, 300);
                ctx.rotate(angle + slice / 2);
                ctx.fillStyle = (colors[i % colors.length].startsWith('#f')) ? 'black' : 'white';
                ctx.font = "bold 24px sans-serif";
                ctx.fillText(i + 1, 220, 10);
                ctx.restore();
            });
        }

        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            let duration = 6000;
            let start = performance.now();
            let totalRotation = Math.random() * 50 + 50;
            let lastTickAngle = 0;
            const slice = (Math.PI * 2) / names.length;

            function animate(now) {
                let time = now - start;
                let progress = Math.min(time / duration, 1);
                let ease = 1 - Math.pow(1 - progress, 4);
                currentRotation = totalRotation * ease;

                // Звук щелчка при прохождении сектора
                if (Math.floor(currentRotation / slice) > lastTickAngle) {
                    playTick();
                    lastTickAngle = Math.floor(currentRotation / slice);
                }

                draw();
                if (progress < 1) requestAnimationFrame(animate);
                else finishSpin();
            }
            requestAnimationFrame(animate);
        }

        function finishSpin() {
            const slice = (Math.PI * 2) / names.length;
            const winningIndex = Math.floor(( (2 * Math.PI - (currentRotation % (2 * Math.PI))) + (1.5 * Math.PI) ) / slice) % names.length;
            
            document.getElementById('winner-name').innerText = names[winningIndex];
            document.getElementById('overlay').style.display = 'flex';
            
            // Запуск конфетти
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#f1c40f', '#ffffff'] });
        }

        function closeOverlay() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('spinBtn').disabled = false;
        }

        draw();
    </script>
</body>
</html>
