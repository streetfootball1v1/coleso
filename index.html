<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Raffle</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body {
            background: #000; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0;
        }
        
        #stage {
            position: relative; width: 100%; max-width: 400px; height: 300px;
            display: flex; align-items: center; justify-content: center;
        }

        .floating-paper {
            position: absolute; width: 80px; height: 40px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(10px, -20px) rotate(5deg); }
            66% { transform: translate(-10px, 10px) rotate(-5deg); }
        }

        #draw-btn {
            background: #fff; color: #000; border: none;
            padding: 20px 40px; font-size: 14px; font-weight: 600;
            letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; border-radius: 100px; transition: 0.4s;
            margin-top: 50px;
        }
        #draw-btn:hover { transform: scale(1.05); background: #f0f0f0; }
        #draw-btn:disabled { opacity: 0.2; }

        #result {
            display: none; position: fixed; inset: 0; background: #000;
            z-index: 100; flex-direction: column; align-items: center; justify-content: center;
        }

        .winner-label { color: #888; font-size: 12px; letter-spacing: 4px; margin-bottom: 20px; }
        .winner-name { font-size: 42px; font-weight: 200; border-bottom: 1px solid #333; padding-bottom: 20px; }
    </style>
</head>
<body>

    <div id="stage">
        </div>

    <button id="draw-btn" onclick="start()">Начать выбор</button>

    <div id="result" onclick="reset()">
        <div class="winner-label">ПОБЕДИТЕЛЬ</div>
        <div id="winner-display" class="winner-name">ИМЯ</div>
        <p style="color: #444; margin-top: 50px; font-size: 11px;">КЛИКНИТЕ ДЛЯ ВОЗВРАТА</p>
    </div>

    <script>
        const stage = document.getElementById('stage');
        const params = new URLSearchParams(window.location.search);
        const names = (params.get('names') || "Анна,Марк,Елена,Иван,Сара").split(',');

        function init() {
            // Создаем 40 декоративных бумажек
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'floating-paper';
                p.style.left = Math.random() * 80 + 10 + '%';
                p.style.top = Math.random() * 80 + 10 + '%';
                p.style.animationDelay = Math.random() * 5 + 's';
                p.style.opacity = Math.random() * 0.5;
                stage.appendChild(p);
            }
        }

        function start() {
            document.getElementById('draw-btn').disabled = true;
            
            // Плавное исчезновение всех бумажек
            const papers = document.querySelectorAll('.floating-paper');
            papers.forEach(p => p.style.transition = '2s');
            papers.forEach(p => p.style.opacity = '0');

            setTimeout(() => {
                const winner = names[Math.floor(Math.random() * names.length)];
                document.getElementById('winner-display').innerText = winner;
                document.getElementById('result').style.display = 'flex';
                
                confetti({
                    particleCount: 50, spread: 60, colors: ['#ffffff'],
                    origin: { y: 0.8 }, scalar: 0.7
                });
            }, 2500);
        }

        function reset() {
            location.reload();
        }

        init();
    </script>
</body>
</html>
