<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Raffle</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fdfaf6;
            --card-bg: #ffffff;
            --accent: #d4a373; /* Приятный бежевый */
            --text: #4a4a4a;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            margin: 0; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-weight: 400; font-size: 28px; font-style: italic;
            margin-bottom: 40px; letter-spacing: 1px;
        }

        #table {
            position: relative; width: 100%; max-width: 500px; height: 400px;
            display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
        }

        .note {
            position: absolute; width: 90px; height: 110px;
            background: var(--card-bg);
            border-radius: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0,0,0,0.02);
        }

        /* Имитация фотокарточки */
        .note::before {
            content: ''; width: 70px; height: 70px;
            background: #f0f0f0; margin-bottom: 10px; border-radius: 1px;
        }

        #draw-btn {
            margin-top: 50px; padding: 15px 45px;
            font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 400;
            letter-spacing: 2px; text-transform: uppercase;
            background-color: var(--accent); color: white;
            border: none; border-radius: 40px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(212, 163, 115, 0.2);
            transition: 0.3s;
        }
        #draw-btn:hover { background-color: #bc8a5f; transform: translateY(-2px); }

        /* Окно финала */
        #result-screen {
            display: none; position: fixed; inset: 0;
            background: rgba(253, 250, 246, 0.98);
            z-index: 100; flex-direction: column; align-items: center; justify-content: center;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .winner-card {
            width: 240px; height: 300px; background: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center; border-radius: 3px;
        }

        .winner-photo {
            width: 200px; height: 200px; background: var(--bg);
            margin-bottom: 20px; display: flex; align-items: center; justify-content: center;
        }

        .winner-name {
            font-family: 'Playfair Display', serif; font-size: 26px; color: var(--text);
        }
    </style>
</head>
<body>

    <h2>The Giveaway Collection</h2>

    <div id="table">
        </div>

    <button id="draw-btn" onclick="startSelection()">Pick a winner</button>

    <div id="result-screen" onclick="location.reload()">
        <p style="letter-spacing: 3px; font-size: 12px; margin-bottom: 30px; opacity: 0.6;">CONGRATULATIONS</p>
        <div class="winner-card">
            <div class="winner-photo">✨</div>
            <div id="winner-name" class="winner-name">Name</div>
        </div>
        <p style="margin-top: 50px; font-size: 10px; letter-spacing: 2px; opacity: 0.4;">TOUCH TO RESET</p>
    </div>

    <script>
        const table = document.getElementById('table');
        const params = new URLSearchParams(window.location.search);
        const names = (params.get('names') || "Anna,Mark,Elena,John,Sarah,Olga,Daria,Ivan").split(',');

        function init() {
            // Создаем 30 карточек (реальные + пустышки)
            for (let i = 0; i < 30; i++) {
                const note = document.createElement('div');
                note.className = 'note';
                
                // Случайное положение и легкий поворот
                const x = (Math.random() - 0.5) * 350;
                const y = (Math.random() - 0.5) * 300;
                const r = (Math.random() - 0.5) * 40;
                
                note.style.transform = `translate(${x}px, ${y}px) rotate(${r}deg)`;
                note.style.zIndex = Math.floor(Math.random() * 10);
                
                table.appendChild(note);
            }
        }

        function startSelection() {
            const btn = document.getElementById('draw-btn');
            btn.disabled = true;
            btn.style.opacity = '0.3';

            const notes = document.querySelectorAll('.note');
            
            // Эффект "перемешивания" — карточки плавно меняют местами
            notes.forEach(note => {
                const x = (Math.random() - 0.5) * 100;
                const y = (Math.random() - 0.5) * 100;
                note.style.transform += ` translate(${x}px, ${y}px)`;
            });

            setTimeout(() => {
                const winner = names[Math.floor(Math.random() * names.length)];
                document.getElementById('winner-name').innerText = winner;
                document.getElementById('result-screen').style.display = 'flex';
                
                // Эстетичное конфетти (только золотистые и белые)
                confetti({
                    particleCount: 40, spread: 50, origin: { y: 0.7 },
                    colors: ['#d4a373', '#ffffff', '#faedcd'],
                    scalar: 0.8, gravity: 0.5
                });
            }, 2000);
        }

        init();
    </script>
</body>
</html>
