<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite 3D Lotto Sphere</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --gold: #f1c40f;
            --silver: #bdc3c7;
            --accent: #00d2ff;
        }
        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #020205 100%);
            color: white; font-family: 'Inter', sans-serif;
            margin: 0; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            perspective: 1200px;
        }

        /* 3D Сцена */
        #scene {
            position: relative; width: 400px; height: 400px;
            transform-style: preserve-3d;
            transition: transform 1s ease-in-out;
        }

        /* Профессиональная сфера (барабан) */
        #drum {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, rgba(0,210,255,0.05) 100%);
            box-shadow: 0 0 100px rgba(0, 210, 255, 0.1), inset 0 0 50px rgba(255,255,255,0.05);
            transform-style: preserve-3d;
            display: flex; align-items: center; justify-content: center;
        }

        /* Стеклянный блеск */
        .glass-glare {
            position: absolute; width: 80%; height: 80%;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Кольца барабана (металл) */
        .ring {
            position: absolute; border: 4px solid var(--silver);
            border-radius: 50%; width: 102%; height: 102%;
            opacity: 0.3; transform: rotateX(80deg);
        }

        /* Контейнер для летающих билетов */
        #particles-container {
            position: absolute; width: 100%; height: 100%;
            transform-style: preserve-3d;
        }

        .ticket {
            position: absolute; width: 30px; height: 15px;
            background: var(--silver); opacity: 0.8;
            border-radius: 2px; transform-style: preserve-3d;
        }

        .ticket.vip { background: var(--gold); box-shadow: 0 0 10px var(--gold); }

        /* Кнопка */
        #action-btn {
            margin-top: 60px; padding: 20px 80px; font-size: 18px;
            font-weight: 900; color: white; text-transform: uppercase;
            letter-spacing: 5px; cursor: pointer;
            background: none; border: 2px solid var(--accent);
            border-radius: 5px; position: relative;
            transition: 0.4s; z-index: 10;
        }
        #action-btn:hover {
            background: var(--accent); color: #000;
            box-shadow: 0 0 40px var(--accent);
        }

        /* Результат */
        #modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.95); z-index: 1000;
            flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }
        #winner-card {
            background: linear-gradient(135deg, #fff 0%, #ddd 100%);
            color: #000; padding: 60px; border-radius: 2px;
            text-align: center; transform: rotateY(90deg);
            transition: 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 0 100px rgba(255,255,255,0.2);
        }
        #modal.active #winner-card { transform: rotateY(0deg); }
    </style>
</head>
<body>

    <div id="scene">
        <div id="drum">
            <div class="glass-glare"></div>
            <div class="ring" style="transform: rotateY(90deg)"></div>
            <div class="ring" style="transform: rotateX(90deg)"></div>
            <div id="particles-container"></div>
        </div>
    </div>

    <button id="action-btn" onclick="runLottery()">Launch Draw</button>

    <div id="modal" onclick="closeModal()">
        <h2 style="color: var(--accent); font-weight: 200; letter-spacing: 10px;">WINNER</h2>
        <div id="winner-card">
            <div style="font-size: 14px; color: #888; margin-bottom: 10px;">OFFICIAL TICKET</div>
            <h1 id="winner-name" style="font-size: 48px; margin: 0;">NAME</h1>
        </div>
        <p style="margin-top: 40px; color: #444; font-size: 12px;">CLICK TO EXIT</p>
    </div>

    <script>
        const container = document.getElementById('particles-container');
        const params = new URLSearchParams(window.location.search);
        const realNames = (params.get('names') || "Anna,Mark,Helen,John,Sarah").split(',');
        
        const tickets = [];
        const TICKET_COUNT = 120;

        // Инициализация 3D частиц
        function init() {
            for (let i = 0; i < TICKET_COUNT; i++) {
                const div = document.createElement('div');
                div.className = 'ticket' + (i < realNames.length ? ' vip' : '');
                
                const ticket = {
                    el: div,
                    x: (Math.random() - 0.5) * 300,
                    y: (Math.random() - 0.5) * 300,
                    z: (Math.random() - 0.5) * 300,
                    rx: Math.random() * 360,
                    ry: Math.random() * 360,
                    vx: 0, vy: 0, vz: 0
                };
                
                container.appendChild(div);
                tickets.push(ticket);
            }
            render();
        }

        function render() {
            tickets.forEach(t => {
                t.el.style.transform = `translate3d(${t.x}px, ${t.y}px, ${t.z}px) rotateX(${t.rx}deg) rotateY(${t.ry}deg)`;
            });
        }

        function runLottery() {
            const btn = document.getElementById('action-btn');
            btn.style.opacity = '0';
            btn.disabled = true;

            let start = performance.now();
            const duration = 5000;

            function animate(now) {
                const elapsed = now - start;
                const progress = elapsed / duration;
                const scene = document.getElementById('scene');

                if (progress < 1) {
                    // Вращение всей сцены
                    scene.style.transform = `rotateY(${progress * 1000}deg) rotateX(${Math.sin(progress * 5) * 20}deg)`;
                    
                    tickets.forEach(t => {
                        const speed = Math.sin(progress * Math.PI) * 40;
                        t.x += (Math.random() - 0.5) * speed;
                        t.y += (Math.random() - 0.5) * speed;
                        t.z += (Math.random() - 0.5) * speed;

                        // Ограничение сферой
                        const dist = Math.sqrt(t.x**2 + t.y**2 + t.z**2);
                        if (dist > 180) {
                            t.x *= 0.9; t.y *= 0.9; t.z *= 0.9;
                        }
                        
                        t.rx += speed;
                        t.ry += speed;
                    });

                    render();
                    requestAnimationFrame(animate);
                } else {
                    showWinner();
                }
            }
            requestAnimationFrame(animate);
        }

        function showWinner() {
            const winner = realNames[Math.floor(Math.random() * realNames.length)];
            document.getElementById('winner-name').innerText = winner;
            const modal = document.getElementById('modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 100);

            confetti({
                particleCount: 200, spread: 80, origin: { y: 0.7 },
                colors: ['#00d2ff', '#f1c40f', '#ffffff']
            });
        }

        function closeModal() {
            location.reload(); // Перезагрузка для нового шанса
        }

        init();
    </script>
</body>
</html>
