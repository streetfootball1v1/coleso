<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Cards Raffle</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; 
        }
        h2 { margin-bottom: 20px; color: #38bdf8; text-transform: uppercase; letter-spacing: 2px; }
        
        #card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 15px;
            width: 90%;
            max-width: 600px;
            padding: 20px;
        }

        .card {
            aspect-ratio: 2/3;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 2px solid #38bdf8;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            text-align: center;
            transition: transform 0.6s, box-shadow 0.3s;
            transform-style: preserve-3d;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .card:hover {
            transform: translateY(-10px) rotateY(10deg);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
        }

        .card.flipped {
            transform: rotateY(180deg);
            background: #38bdf8;
            color: #0f172a;
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            box-sizing: border-box;
        }

        .card-back {
            transform: rotateY(180deg);
            font-size: 14px;
        }

        .card-front::after {
            content: "?";
            font-size: 24px;
            color: #38bdf8;
            opacity: 0.5;
        }

        #controls { margin-top: 30px; }
        button {
            padding: 12px 30px; font-size: 16px; font-weight: bold;
            background: #38bdf8; color: #0f172a; border: none;
            border-radius: 8px; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #7dd3fc; }
    </style>
</head>
<body>

    <h2 id="status">Выбери любую карту!</h2>

    <div id="card-container">
        </div>

    <div id="controls">
        <button onclick="shuffleCards()">ПЕРЕМЕШАТЬ</button>
    </div>

    <script>
        const container = document.getElementById('card-container');
        const statusText = document.getElementById('status');
        const params = new URLSearchParams(window.location.search);
        const names = (params.get('names') || "Анна,Игорь,Мария,Олег,Елена,Дмитрий,Светлана,Артем").split(',');
        
        let hasWinner = false;

        function createCards() {
            container.innerHTML = '';
            hasWinner = false;
            statusText.innerText = "Выбери любую карту!";
            
            // Берем только до 12 имен для красоты сетки, если их больше
            const displayNames = names.slice(0, 12);
            
            displayNames.forEach((name) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => flip(card, name);
                
                card.innerHTML = `
                    <div class="card-front"></div>
                    <div class="card-back">${name}</div>
                `;
                
                container.appendChild(card);
            });
        }

        function flip(card, name) {
            if (hasWinner || card.classList.contains('flipped')) return;
            
            hasWinner = true;
            card.classList.add('flipped');
            statusText.innerText = "Ура! Победитель найден!";
            
            // Эффект праздника
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#38bdf8', '#ffffff']
            });

            // Через секунду показываем остальные имена (для честности)
            setTimeout(() => {
                const allCards = document.querySelectorAll('.card');
                allCards.forEach(c => {
                    if (!c.classList.contains('flipped')) {
                        c.style.opacity = "0.5";
                        c.classList.add('flipped');
                    }
                });
            }, 1500);
        }

        function shuffleCards() {
            // Простая анимация "тряски" перед пересозданием
            container.style.transform = "scale(0.95)";
            setTimeout(() => {
                container.style.transform = "scale(1)";
                createCards();
            }, 200);
        }

        createCards();
    </script>
</body>
</html>
