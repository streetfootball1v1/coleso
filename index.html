<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Lotto Jar</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f9f6f2;
            --glass: rgba(255, 255, 255, 0.4);
            --gold: #d4a373;
            --text: #5e5e5e;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            margin: 0; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 32px; font-style: italic; font-weight: 400;
            margin-bottom: 30px; letter-spacing: 1px;
        }

        /* Эстетичная Колба */
        #jar-container {
            position: relative; width: 320px; height: 420px;
            background: var(--glass);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 120px 120px 40px 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05), inset 0 0 20px rgba(255,255,255,0.5);
            backdrop-filter: blur(5px);
            overflow: hidden;
        }

        /* Золотая каемка сверху */
        #jar-container::before {
            content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 120px; height: 8px; background: var(--gold); border-radius: 0 0 10px 10px;
            opacity: 0.6;
        }

        .paper {
            position: absolute; width: 40px; height: 20px;
            border-radius: 2px;
            box-shadow: 1px 1px 4px rgba(0,0,0,0.05);
            transition: transform 0.1s linear;
        }

        #draw-btn {
            margin-top: 40px; padding: 18px 50px;
            font-size: 13px; font-weight: 500; letter-spacing: 2px;
            text-transform: uppercase; border: none;
            background: white; color: var(--gold);
            border-radius: 40px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        #draw-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

        /* Экран победителя */
        #overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(249, 246, 242, 0.98);
            z-index: 100; flex-direction: column; align-items: center; justify-content: center;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .winner-paper {
            background: white; padding: 40px 60px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.05);
            border-radius: 2px; text-align: center;
            border: 1px solid #f0f0f0;
            transform: rotate(-2deg);
        }

        .winner-name {
            font-family: 'Playfair Display', serif; font-size: 34px; color: var(--gold); margin: 0;
        }
    </style>
</head>
<body>

    <h2>The Lucky Draw</h2>

    <div id="jar-container">
        </div>

    <button id="draw-btn" onclick="startSelection()">Начать розыгрыш</button>

    <div id="overlay" onclick="location.reload()">
        <p style="letter-spacing: 3px; font-size: 11px; margin-bottom: 20px; opacity: 0.5;">AND THE WINNER IS...</p>
        <div class="winner-paper">
            <h1 id="winner-name" class="winner-name">Name</h1>
        </div>
        <p style="margin-top: 50px; font-size: 10px; opacity: 0.3; letter-spacing: 1px;">TOUCH TO RESTART</p>
    </div>

    <script>
        const container = document.getElementById('jar-container');
        const params = new URLSearchParams(window.location.search);
        const realNames = (params.get('names') || "Anna,Mark,Helen,John,Sarah").split(',');
        
        const paperColors = ['#faedcd', '#f1e3d3', '#e9edc9', '#fefae0', '#faedcd'];
        const papers = [];
        const TOTAL_PAPERS = 80;

        function init() {
            for (let i = 0; i < TOTAL_PAPERS; i++) {
                const el = document.createElement('div');
                el.className = 'paper';
                el.style.backgroundColor = paperColors[i % paperColors.length];
                
                const p = {
                    el,
                    x: Math.random() * 260 + 20,
                    y: Math.random() * 300 + 80,
                    r: Math.random() * 360,
                    vx: 0, vy: 0
                };
                
                container.appendChild(el);
                papers.push(p);
            }
            update();
        }

        function update() {
            papers.forEach(p => {
                p.el.style.transform = `translate(${p.x}px, ${p.y}px) rotate(${p.r}deg)`;
            });
        }

        function startSelection() {
            const btn = document.getElementById('draw-btn');
            btn.disabled = true; btn.style.opacity = '0.5';

            let start = performance.now();
            const duration = 3500;

            function animate(now) {
                const elapsed = now - start;
                const progress = elapsed / duration;

                if (progress < 1) {
                    papers.forEach(p => {
                        // Плавный вихрь
                        const power = Math.sin(progress * Math.PI) * 15;
                        p.vx += (Math.random() - 0.5) * power;
                        p.vy += (Math.random() - 0.5) * power;
                        
                        p.vx *= 0.95; p.vy *= 0.95;
                        p.x += p.vx; p.y += p.vy;
                        p.r += p.vx * 2;

                        if (p.x < 10 || p.x > 270) p.vx *= -1.2;
                        if (p.y < 40 || p.y > 380) p.vy *= -1.2;
                    });
                    update();
                    requestAnimationFrame(animate);
                } else {
                    const winner = realNames[Math.floor(Math.random() * realNames.length)];
                    document.getElementById('winner-name').innerText = winner;
                    document.getElementById('overlay').style.display = 'flex';
                    
                    confetti({
                        particleCount: 60, spread: 50, origin: { y: 0.7 },
                        colors: ['#d4a373', '#ffffff'], scalar: 0.7
                    });
                }
            }
            requestAnimationFrame(animate);
        }

        init();
    </script>
</body>
</html>
