<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Lotto Jar</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            background: #121212; color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        
        #jar-container {
            position: relative; width: 320px; height: 400px;
            border: 6px solid rgba(255,255,255,0.2);
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
            background: rgba(255,255,255,0.05);
            box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.1);
            overflow: hidden;
        }

        .paper {
            position: absolute; width: 60px; height: 30px;
            background: #f1c40f; color: transparent;
            border-radius: 4px; border: 1px solid #d4ac0d;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        button {
            margin-top: 40px; padding: 15px 50px; font-size: 20px; font-weight: bold;
            cursor: pointer; background: #27ae60; color: white;
            border: none; border-radius: 10px; transition: 0.3s;
        }
        button:hover { background: #2ecc71; transform: scale(1.05); }

        #overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        
        #winner-paper {
            width: 280px; height: 140px; background: white; color: #333;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; font-weight: bold; border-radius: 5px;
            box-shadow: 0 0 30px rgba(255,255,255,0.5);
            transform: rotate(-2deg);
            animation: unfold 0.6s ease-out;
        }

        @keyframes unfold {
            from { transform: scale(0) rotate(20deg); opacity: 0; }
            to { transform: scale(1) rotate(-2deg); opacity: 1; }
        }
    </style>
</head>
<body>

    <h2 id="title">ЛОТОТРОН</h2>

    <div id="jar-container">
        </div>

    <button id="drawBtn" onclick="startDraw()">ДОСТАТЬ ИМЯ</button>

    <div id="overlay" onclick="closeOverlay()">
        <p style="color: #aaa;">ВЫТЯНУТЫЙ ЛИСТОЧЕК:</p>
        <div id="winner-paper">ИМЯ</div>
        <p style="margin-top: 30px; font-size: 14px;">(нажми, чтобы закрыть)</p>
    </div>

    <script>
        const container = document.getElementById('jar-container');
        const params = new URLSearchParams(window.location.search);
        const names = (params.get('names') || "Анна,Иван,Мария,Олег,Елена,Дмитрий,Светлана,Игорь,Артем,Ольга").split(',');
        
        let papers = [];

        // Создаем "бумажки" в банке
        function createPapers() {
            names.forEach((name, i) => {
                const el = document.createElement('div');
                el.className = 'paper';
                // Раскидываем случайно по банке
                const x = Math.random() * (320 - 60);
                const y = Math.random() * (400 - 30);
                el.style.left = x + 'px';
                el.style.top = y + 'px';
                el.style.transform = `rotate(${Math.random() * 360}deg)`;
                el.style.background = `hsl(${Math.random() * 360}, 70%, 70%)`;
                container.appendChild(el);
                papers.push({ el, x, y, vx: 0, vy: 0 });
            });
        }

        function startDraw() {
            document.getElementById('drawBtn').disabled = true;
            let duration = 3000;
            let start = performance.now();

            function animate(now) {
                let time = now - start;
                let progress = time / duration;

                if (progress < 1) {
                    // Эффект тряски (перемешивания)
                    papers.forEach(p => {
                        p.vx = (Math.random() - 0.5) * 30;
                        p.vy = (Math.random() - 0.5) * 30;
                        p.x += p.vx;
                        p.y += p.vy;

                        // Стенки
                        if (p.x < 0 || p.x > 260) p.x = Math.random() * 260;
                        if (p.y < 0 || p.y > 370) p.y = Math.random() * 370;

                        p.el.style.left = p.x + 'px';
                        p.el.style.top = p.y + 'px';
                        p.el.style.transform = `rotate(${now + Math.random() * 10}deg)`;
                    });
                    requestAnimationFrame(animate);
                } else {
                    finishDraw();
                }
            }
            requestAnimationFrame(animate);
        }

        function finishDraw() {
            const winner = names[Math.floor(Math.random() * names.length)];
            document.getElementById('winner-paper').innerText = winner;
            document.getElementById('overlay').style.display = 'flex';
            
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        }

        function closeOverlay() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('drawBtn').disabled = false;
        }

        createPapers();
    </script>
</body>
</html>
